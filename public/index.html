<!DOCTYPE html>
<html>
<head>
  <title>AI Website Generator</title>
</head>
<body>

<h1>AI Website Generator</h1>

<input id="prompt" placeholder="Enter idea..." />
<button onclick="generate()">Generate Website</button>

<pre id="output"></pre>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ prompt }),
  });

  const data = await res.json();

  document.getElementById("output").innerText = data.result || JSON.stringify(data);
}
</script>

</body>
</html>
